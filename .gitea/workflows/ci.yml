name: APRIL CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, dom, xml, mbstring, intl, curl, zip, pdo_pgsql
          coverage: none

      - name: Configure Composer auth for private Gitea packages
        run: |
          composer config --global --auth http-basic.10.0.3.198:3000 "${{ secrets.GITEAPACKAGEUSER }}" "${{ secrets.GITEAPACKAGETOKEN }}"
          composer config --global secure-http false

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP syntax check
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run tests
        run: composer test
