# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    amagno.base_uri: '%env(string:AMAGNO_BASE_URI)%'
    amagno.api_token: '%env(string:AMAGNO_API_TOKEN)%'
    amagno.matching_file: '%kernel.project_dir%/%env(string:AMAGNO_MATCHING_FILE)%'
    amagno.template_dir: '%kernel.project_dir%/%env(string:AMAGNO_TEMPLATE_DIR)%'
    amagno.checkpoint_dir: '%kernel.project_dir%/%env(string:AMAGNO_CHECKPOINT_DIR)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    _instanceof:
        App\Service\Export\ExporterInterface:
            tags: ['app.exporter']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\Amagno\DocumentFetcher:
        arguments:
            $baseUri: '%amagno.base_uri%'
            $apiToken: '%amagno.api_token%'

    App\Service\Amagno\MatchingLoader:
        arguments:
            $matchingFile: '%amagno.matching_file%'

    App\Service\Checkpoint\CheckpointStore:
        arguments:
            $directory: '%amagno.checkpoint_dir%'

    App\Service\Processing\MatchingProvider:
        arguments:
            $templateDir: '%amagno.template_dir%'

    App\Service\Export\ExporterRegistry:
        arguments:
            $exporters: !tagged_iterator app.exporter

    App\Service\Export\AmagnoUploader:
        arguments:
            $baseUri: '%amagno.base_uri%'

    App\Service\Export\ExcelConverter: ~

    App\Service\FibuExportService:
        arguments:
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultApiToken: '%amagno.api_token%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Security-Klassen
    Iileven\AmagnoConnector\Security\:
        resource: '../vendor/iileven/AmagnoApiConnector/Security/*'
        public: false
        autowire: true
        autoconfigure: true

    # Factory-Klassen
    Iileven\AmagnoConnector\Factory\:
        resource: '../vendor/iileven/AmagnoApiConnector/Factory/*'
        public: false
        autowire: true
        autoconfigure: true

    # Interface-Definitionen (PSR-Interfaces)
    Iileven\AmagnoConnector\Interface\:
        resource: '../vendor/iileven/AmagnoApiConnector/Interface/*'
        public: false
        autowire: true
        autoconfigure: true
