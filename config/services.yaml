# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    amagno.base_uri: '%env(string:AMAGNO_BASE_URI)%'
    amagno.api_token: '%env(string:AMAGNO_API_TOKEN)%'
    amagno.api_username: '%env(string:AMAGNO_API_USERNAME)%'
    amagno.api_password: '%env(string:AMAGNO_API_PASSWORD)%'
    amagno.api_auth_type: '%env(string:AMAGNO_API_AUTH_TYPE)%'
    amagno.credential_id: '%env(default::int:AMAGNO_CREDENTIAL_ID)%'
    amagno.connections_file: '%kernel.project_dir%/%env(string:AMAGNO_CONNECTIONS_FILE)%'
    amagno.matching_file: '%kernel.project_dir%/%env(string:AMAGNO_MATCHING_FILE)%'
    amagno.template_dir: '%kernel.project_dir%/%env(string:AMAGNO_TEMPLATE_DIR)%'
    amagno.checkpoint_dir: '%kernel.project_dir%/%env(string:AMAGNO_CHECKPOINT_DIR)%'
    amagno.stamp_retries: 3
    intelligence.event_store_file: '%kernel.project_dir%/var/intelligence/process_events.jsonl'
    intelligence.event_secret: ''
    intelligence.context_profiles: []
    april.process_template_dir: '%kernel.project_dir%/config/april/process-templates'
    april.generated_dir: '%kernel.project_dir%/var/april/generated'
    april.heatmap_output_dir: '%kernel.project_dir%/var/april/generated/heatmaps'
    april.diagram_output_dir: '%kernel.project_dir%/var/april/generated/diagrams'
    april.app_username: '%env(string:APRIL_APP_USERNAME)%'
    april.app_password_hash: '%env(string:APRIL_APP_PASSWORD_HASH)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    _instanceof:
        App\Service\Export\ExporterInterface:
            tags: ['app.exporter']
        App\Intelligence\Port\AccessProbeProvider:
            tags: ['app.access_probe_provider']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Security\EnvUserProvider:
        arguments:
            $aprilAppUsername: '%april.app_username%'
            $aprilAppPasswordHash: '%april.app_password_hash%'

    App\Service\Amagno\ConnectionConfigLoader:
        arguments:
            $configPath: '%amagno.connections_file%'

    App\Service\Amagno\ConnectionRegistry:
        arguments:
            $configLoader: '@App\Service\Amagno\ConnectionConfigLoader'

    App\Service\Amagno\DocumentFetcher:
        arguments:
            $baseUri: '%amagno.base_uri%'
            $apiToken: '%amagno.api_token%'
            $tokenProvider: '@App\Service\Amagno\ApiTokenProviderInterface'
            $credentialId: '%amagno.credential_id%'

    App\Service\Amagno\AmagnoConnectorTokenProvider:
        arguments:
            $connectorTokenProvider: '@Iileven\AmagnoConnector\Interface\TokenProviderInterface'

    App\Service\Amagno\ApiTokenProviderInterface:
        alias: App\Service\Amagno\AmagnoConnectorTokenProvider

    App\Service\Amagno\CredentialStoreInterface:
        alias: App\Service\Amagno\CredentialStore

    App\Service\Amagno\DocumentGatewayInterface:
        alias: App\Service\Amagno\DocumentFetcher

    App\Service\Amagno\CredentialStore:
        arguments:
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultUsername: '%amagno.api_username%'
            $defaultPassword: '%amagno.api_password%'

    App\Service\Amagno\DocumentTagWriter:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'

    App\Service\Amagno\MatchingLoader:
        arguments:
            $matchingFile: '%amagno.matching_file%'

    App\Service\Settings\LegacyMatchingSaveService:
        arguments:
            $matchingFile: '%amagno.matching_file%'

    App\Service\Settings\SettingsProfileProvider:
        arguments:
            $matchingFile: '%amagno.matching_file%'

    App\Service\Checkpoint\CheckpointStore:
        arguments:
            $directory: '%amagno.checkpoint_dir%'

    App\Service\Processing\MatchingProvider:
        arguments:
            $templateDir: '%amagno.template_dir%'

    App\Service\Processing\StampService:
        arguments:
            $defaultMaxRetries: '%amagno.stamp_retries%'

    App\Service\Export\ExporterRegistry:
        arguments:
            $exporters: !tagged_iterator app.exporter

    App\Service\Export\AmagnoUploader:
        arguments:
            $baseUri: '%amagno.base_uri%'

    App\Service\Export\ExcelConverter: ~

    App\Service\FibuExportService:
        arguments:
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultApiToken: '%amagno.api_token%'
            $defaultApiUsername: '%amagno.api_username%'
            $defaultApiPassword: '%amagno.api_password%'
            $defaultApiAuthType: '%amagno.api_auth_type%'

    App\Service\SignatureCheck\AmagnoSignatureCheckService:
        arguments:
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultApiToken: '%amagno.api_token%'
            $defaultApiUsername: '%amagno.api_username%'
            $defaultApiPassword: '%amagno.api_password%'

    App\Service\SignatureCheck\SignatureCheckServiceInterface:
        alias: App\Service\SignatureCheck\AmagnoSignatureCheckService

    App\Intelligence\Port\EventNormalizer:
        alias: App\Intelligence\Infrastructure\Normalizer\GenericPayloadEventNormalizer

    App\Intelligence\Port\EventStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventStore

    App\Intelligence\Port\SignatureVerifier:
        alias: App\Intelligence\Infrastructure\Security\HmacSignatureVerifier

    App\Intelligence\Application\ProcessInstanceRepository:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessInstanceRepository

    App\Intelligence\Application\ProcessVersionRepository:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessVersionRepository

    App\Intelligence\Application\CurrentTenantProvider:
        alias: App\Intelligence\Infrastructure\Tenant\DefaultTenantProvider

    App\Intelligence\Application\ContextProfileProvider:
        alias: App\Intelligence\Infrastructure\Context\InMemoryContextProfileProvider

    App\Intelligence\Application\ProcessTemplateProvider:
        alias: App\Intelligence\Infrastructure\Template\YamlProcessTemplateProvider

    App\Intelligence\Application\TemplateContextProviderResolver:
        alias: App\Intelligence\Infrastructure\Context\TemplateMappedContextProviderResolver

    App\Intelligence\Application\ContextSnapshotStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineContextSnapshotRepository

    App\Intelligence\Application\ContextSnapshotHistoryProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineContextSnapshotHistoryProvider

    App\Intelligence\Application\IncomingEventStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineIncomingEventRepository

    App\Intelligence\Application\ProcessStatusReportProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessStatusReportProvider

    App\Intelligence\Application\ContextCoverageReportProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineContextCoverageReportProvider

    App\Intelligence\Application\DocumentTimelineProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineDocumentTimelineProvider

    App\Intelligence\Application\ProcessDocumentUuidProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessDocumentUuidProvider

    App\Intelligence\Application\DocumentListProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineDocumentListProvider

    App\Intelligence\Application\ProcessKeyOverviewProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessKeyOverviewProvider

    App\Intelligence\Application\DocumentCheckResultProvider:
        alias: App\Intelligence\Application\ProcessTemplateCheckResultProvider

    App\Intelligence\Application\EventListProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventListProvider

    App\Intelligence\Application\EventDetailsProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventDetailsProvider

    App\Intelligence\Application\ProcessResetter:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessResetter

    App\Intelligence\Application\VisibilityCheckResultStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineVisibilityCheckResultRepository

    App\Intelligence\Application\VisibilityCheckResultProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineVisibilityCheckResultRepository

    App\Intelligence\Port\ContextProvider:
        alias: App\Intelligence\Infrastructure\Context\NullContextProvider

    App\Intelligence\Connector\Amagno\AmagnoDocumentGateway:
        alias: App\Intelligence\Connector\Amagno\DocumentFetcherGateway

    App\Intelligence\Infrastructure\EventStore\JsonFileEventStore:
        arguments:
            $path: '%intelligence.event_store_file%'

    App\Intelligence\Infrastructure\Context\InMemoryContextProfileProvider:
        arguments:
            $profiles: '%intelligence.context_profiles%'

    App\Intelligence\Infrastructure\Template\YamlProcessTemplateProvider:
        arguments:
            $templateDirectory: '%april.process_template_dir%'

    App\Intelligence\Application\ProcessTemplateCatalog:
        arguments:
            $templateDirectory: '%april.process_template_dir%'

    App\Command\IntelligenceTemplateListCommand:
        arguments:
            $templateDirectory: '%april.process_template_dir%'

    App\Command\IntelligenceTemplateHeatmapCommand:
        arguments:
            $processTemplateDirectory: '%april.process_template_dir%'
            $heatmapOutputDirectory: '%april.heatmap_output_dir%'

    App\Controller\App\TemplateController:
        arguments:
            $processTemplateDirectory: '%april.process_template_dir%'

    App\Controller\App\TemplateDocumentController:
        arguments:
            $processTemplateDirectory: '%april.process_template_dir%'

    App\Controller\SettingsActionController:
        arguments:
            $matchingSaveService: '@App\Service\Settings\LegacyMatchingSaveService'

    App\Controller\App\DocumentJourneyController:
        arguments:
            $timelineProvider: '@App\Intelligence\Application\DocumentTimelineProvider'
            $templateProvider: '@App\Intelligence\Application\ProcessTemplateProvider'

    App\Command\IntelligenceAccessCheckDocumentCommand:
        arguments:
            $accessProbeProviders: !tagged_iterator app.access_probe_provider
            $resultStore: '@App\Intelligence\Application\VisibilityCheckResultStore'

    App\Intelligence\Connector\Amagno\AmagnoContextProviderFactory:
        arguments:
            $token: '%amagno.api_token%'
            $baseUri: '%amagno.base_uri%'

    App\Intelligence\Infrastructure\Security\HmacSignatureVerifier:
        arguments:
            $secret: '%env(default:intelligence.event_secret:INTELLIGENCE_EVENT_SECRET)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Security-Klassen
    Iileven\AmagnoConnector\Security\:
        resource: '../vendor/iileven/amagno-connector-bundle/Security/*'
        public: false
        autowire: true
        autoconfigure: true

    # Factory-Klassen
    Iileven\AmagnoConnector\Factory\:
        resource: '../vendor/iileven/amagno-connector-bundle/Factory/*'
        public: false
        autowire: true
        autoconfigure: true

    # Interface-Definitionen (PSR-Interfaces)
    Iileven\AmagnoConnector\Interface\:
        resource: '../vendor/iileven/amagno-connector-bundle/Interface/*'
        public: false
        autowire: true
        autoconfigure: true
