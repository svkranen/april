# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    amagno.base_uri: '%env(string:AMAGNO_BASE_URI)%'
    amagno.api_token: '%env(string:AMAGNO_API_TOKEN)%'
    amagno.api_username: '%env(string:AMAGNO_API_USERNAME)%'
    amagno.api_password: '%env(string:AMAGNO_API_PASSWORD)%'
    amagno.api_auth_type: '%env(string:AMAGNO_API_AUTH_TYPE)%'
    amagno.credential_id: '%env(int:AMAGNO_CREDENTIAL_ID)%'
    amagno.connections_file: '%kernel.project_dir%/%env(string:AMAGNO_CONNECTIONS_FILE)%'
    amagno.matching_file: '%kernel.project_dir%/%env(string:AMAGNO_MATCHING_FILE)%'
    amagno.template_dir: '%kernel.project_dir%/%env(string:AMAGNO_TEMPLATE_DIR)%'
    amagno.checkpoint_dir: '%kernel.project_dir%/%env(string:AMAGNO_CHECKPOINT_DIR)%'
    amagno.stamp_retries: 3
    intelligence.event_store_file: '%kernel.project_dir%/var/intelligence/process_events.jsonl'
    intelligence.event_secret: ''
    intelligence.context_profiles: []

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    _instanceof:
        App\Service\Export\ExporterInterface:
            tags: ['app.exporter']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\Amagno\ConnectionConfigLoader:
        arguments:
            $configPath: '%amagno.connections_file%'

    App\Service\Amagno\ConnectionRegistry:
        arguments:
            $configLoader: '@App\Service\Amagno\ConnectionConfigLoader'

    App\Service\Amagno\DocumentFetcher:
        arguments:
            $baseUri: '%amagno.base_uri%'
            $apiToken: '%amagno.api_token%'

    App\Service\Amagno\CredentialStore:
        arguments:
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultUsername: '%amagno.api_username%'
            $defaultPassword: '%amagno.api_password%'

    App\Service\Amagno\DocumentTagWriter:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'

    App\Service\Amagno\MatchingLoader:
        arguments:
            $matchingFile: '%amagno.matching_file%'

    App\Service\Checkpoint\CheckpointStore:
        arguments:
            $directory: '%amagno.checkpoint_dir%'

    App\Service\Processing\MatchingProvider:
        arguments:
            $templateDir: '%amagno.template_dir%'

    App\Service\Processing\StampService:
        arguments:
            $defaultMaxRetries: '%amagno.stamp_retries%'

    App\Service\Export\ExporterRegistry:
        arguments:
            $exporters: !tagged_iterator app.exporter

    App\Service\Export\AmagnoUploader:
        arguments:
            $baseUri: '%amagno.base_uri%'

    App\Service\Export\ExcelConverter: ~

    App\Service\FibuExportService:
        arguments:
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultApiToken: '%amagno.api_token%'
            $defaultApiUsername: '%amagno.api_username%'
            $defaultApiPassword: '%amagno.api_password%'
            $defaultApiAuthType: '%amagno.api_auth_type%'

    App\Service\SignatureCheck\AmagnoSignatureCheckService:
        arguments:
            $defaultBaseUri: '%amagno.base_uri%'
            $defaultCredentialId: '%amagno.credential_id%'
            $defaultApiToken: '%amagno.api_token%'
            $defaultApiUsername: '%amagno.api_username%'
            $defaultApiPassword: '%amagno.api_password%'

    App\Intelligence\Port\EventNormalizer:
        alias: App\Intelligence\Infrastructure\Normalizer\GenericPayloadEventNormalizer

    App\Intelligence\Port\EventStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventStore

    App\Intelligence\Port\SignatureVerifier:
        alias: App\Intelligence\Infrastructure\Security\HmacSignatureVerifier

    App\Intelligence\Application\ProcessInstanceRepository:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessInstanceRepository

    App\Intelligence\Application\ContextProfileProvider:
        alias: App\Intelligence\Infrastructure\Context\InMemoryContextProfileProvider

    App\Intelligence\Application\ContextSnapshotStore:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineContextSnapshotRepository

    App\Intelligence\Application\ProcessStatusReportProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessStatusReportProvider

    App\Intelligence\Application\DocumentTimelineProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineDocumentTimelineProvider

    App\Intelligence\Application\ProcessDocumentUuidProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessDocumentUuidProvider

    App\Intelligence\Application\EventListProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventListProvider

    App\Intelligence\Application\EventDetailsProvider:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineEventDetailsProvider

    App\Intelligence\Application\ProcessResetter:
        alias: App\Intelligence\Infrastructure\Doctrine\Repository\DoctrineProcessResetter

    App\Intelligence\Port\ContextProvider:
        alias: App\Intelligence\Infrastructure\Context\NullContextProvider

    App\Intelligence\Infrastructure\EventStore\JsonFileEventStore:
        arguments:
            $path: '%intelligence.event_store_file%'

    App\Intelligence\Infrastructure\Context\InMemoryContextProfileProvider:
        arguments:
            $profiles: '%intelligence.context_profiles%'

    App\Intelligence\Infrastructure\Security\HmacSignatureVerifier:
        arguments:
            $secret: '%env(default:intelligence.event_secret:INTELLIGENCE_EVENT_SECRET)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Security-Klassen
    Iileven\AmagnoConnector\Security\:
        resource: '../vendor/iileven/AmagnoApiConnector/Security/*'
        public: false
        autowire: true
        autoconfigure: true

    # Factory-Klassen
    Iileven\AmagnoConnector\Factory\:
        resource: '../vendor/iileven/AmagnoApiConnector/Factory/*'
        public: false
        autowire: true
        autoconfigure: true

    # Interface-Definitionen (PSR-Interfaces)
    Iileven\AmagnoConnector\Interface\:
        resource: '../vendor/iileven/AmagnoApiConnector/Interface/*'
        public: false
        autowire: true
        autoconfigure: true
