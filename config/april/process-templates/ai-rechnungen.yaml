key: ai-rechnungen
version: 1.1
name: "AI Rechnungen Demo"
source_system: community-demo
initial_step: "01 Rechnungen pruefen"

required_steps:
  - "01 Rechnungen pruefen"
  - "09 Rechnungen Abschluss"

steps:
  - key: "01 Rechnungseingang"
    name: "Rechnungseingang"
  - key: "02 Freigabe"
    name: "Freigabe"
  - key: "01 Rechnungen pruefen"
    name: "Rechnungen pruefen"
  - key: "02 Versenden"
    name: "Versenden"
  - key: "03 Freigabe_klein"
    name: "Freigabe klein"
  - key: "04 Freigabe_gross"
    name: "Freigabe gross"
  - key: "05 Ausgangsrechnung buchen"
    name: "Ausgangsrechnung buchen"
  - key: "07 Zahlungseingang erwartet"
    name: "Zahlungseingang erwartet"
  - key: "09 Rechnungen Abschluss"
    name: "Rechnungen Abschluss"

context_profile:
  required:
    - invoice_direction
    - amount_net

context_policy:
  snapshot:
    max_delay_seconds: 300
    stale_behavior: uncertain

field_mapping:
  invoice_direction:
    source: event_context
    value_type: string
    stability: snapshot_required
  amount_net:
    source: event_context
    value_type: number
    stability: snapshot_required

transitions:
  - from: "01 Rechnungseingang"
    to: "02 Freigabe"
  - from: "02 Freigabe"
    to: "01 Rechnungen pruefen"
  - from: "01 Rechnungen pruefen"
    to: "02 Versenden"
  - from: "01 Rechnungen pruefen"
    to: "03 Freigabe_klein"
  - from: "01 Rechnungen pruefen"
    to_parallel_group: buchen_und_zahlung
  - from: "02 Versenden"
    to_parallel_group: buchen_und_zahlung
  - from: "03 Freigabe_klein"
    to_parallel_group: buchen_und_zahlung
  - from: "04 Freigabe_gross"
    to_parallel_group: buchen_und_zahlung

parallel_groups:
  - key: buchen_und_zahlung
    required_steps:
      - "05 Ausgangsrechnung buchen"
      - "07 Zahlungseingang erwartet"
    order: any
    next: "09 Rechnungen Abschluss"

decision_points:
  - key: route_after_pruefung
    after: "01 Rechnungen pruefen"
    required_fields:
      - invoice_direction
      - amount_net
    rules:
      - when:
          invoice_direction:
            eq: "RE - Ausgang"
        expect_next: "02 Versenden"

      - when:
          amount_net:
            gt: 1000
        expect_next: "04 Freigabe_gross"

      - when:
          amount_net:
            gt: 50
        expect_next: "03 Freigabe_klein"

      - else:
          expect_next_parallel_group: buchen_und_zahlung
