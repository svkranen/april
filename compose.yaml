services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: dev
      APP_SECRET: local-dev-change-me
      DATABASE_URL: postgresql://april:april@db:5432/april?serverVersion=16&charset=utf8
      DEFAULT_URI: http://localhost:8080
      SERVER_NAME: :80
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - composer-cache:/tmp/composer-cache
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: april
      POSTGRES_USER: april
      POSTGRES_PASSWORD: april
    tmpfs:
      - /var/run/postgresql
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U april -d april"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  composer-cache:
  postgres-data:
